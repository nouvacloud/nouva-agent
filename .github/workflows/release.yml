name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check-types

      - name: Test
        run: bun run test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agent/Dockerfile
          push: true
          build-args: |
            NOUVA_AGENT_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
          tags: |
            ghcr.io/nouvacloud/nouva-agent:${{ github.ref_name }}
            ghcr.io/nouvacloud/nouva-agent:${{ github.sha }}
            ghcr.io/nouvacloud/nouva-agent:latest
          labels: |
            org.opencontainers.image.source=https://github.com/nouvacloud/nouva-agent
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Show image digest
        run: echo "Published ghcr.io/nouvacloud/nouva-agent@${{ steps.docker.outputs.digest }}"
