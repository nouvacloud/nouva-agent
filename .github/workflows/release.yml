name: Release

on:
  release:
    types:
      - published

jobs:
  publish:
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      IMAGE_NAME: ghcr.io/nouvacloud/nouva-agent
    steps:
      - name: Validate release configuration
        env:
          NOUVA_CONTROL_PLANE_URL: ${{ secrets.NOUVA_CONTROL_PLANE_URL }}
          NOUVA_AGENT_RELEASE_WEBHOOK_SECRET: ${{ secrets.NOUVA_AGENT_RELEASE_WEBHOOK_SECRET }}
        run: |
          missing=""

          if [ -z "${NOUVA_CONTROL_PLANE_URL}" ]; then
            missing="NOUVA_CONTROL_PLANE_URL"
          fi

          if [ -z "${NOUVA_AGENT_RELEASE_WEBHOOK_SECRET}" ]; then
            if [ -n "${missing}" ]; then
              missing="${missing}, "
            fi
            missing="${missing}NOUVA_AGENT_RELEASE_WEBHOOK_SECRET"
          fi

          if [ -n "${missing}" ]; then
            echo "Missing required release secret(s): ${missing}" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag matches agent package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node <<'EOF'
          const pkg = require("./agent/package.json");
          const actualTag = process.env.RELEASE_TAG;
          const expectedTag = `v${pkg.version}`;

          if (actualTag !== expectedTag) {
            console.error(
              `Release tag ${actualTag} does not match agent/package.json version ${pkg.version}. Expected ${expectedTag}.`
            );
            process.exit(1);
          }
          EOF

      - name: Typecheck
        run: bun run check-types

      - name: Test
        run: bun run test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agent/Dockerfile
          push: true
          build-args: |
            VCS_REF=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/nouvacloud/nouva-agent
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${IMAGE_NAME}@${{ steps.docker.outputs.digest }}"

      - name: Notify control plane
        env:
          NOUVA_CONTROL_PLANE_URL: ${{ secrets.NOUVA_CONTROL_PLANE_URL }}
          NOUVA_AGENT_RELEASE_WEBHOOK_SECRET: ${{ secrets.NOUVA_AGENT_RELEASE_WEBHOOK_SECRET }}
          VERSION: ${{ github.event.release.tag_name }}
          DIGEST: ${{ steps.docker.outputs.digest }}
          GIT_SHA: ${{ github.sha }}
          GITHUB_RELEASE_ID: ${{ github.event.release.id }}
          GITHUB_RELEASE_URL: ${{ github.event.release.html_url }}
          PUBLISHED_AT: ${{ github.event.release.published_at }}
        run: |
          node <<'EOF'
          const crypto = require("node:crypto");

          (async () => {
            const baseUrl = process.env.NOUVA_CONTROL_PLANE_URL;
            const secret = process.env.NOUVA_AGENT_RELEASE_WEBHOOK_SECRET;
            const imageName = process.env.IMAGE_NAME;
            const digest = process.env.DIGEST;

            if (!baseUrl) {
              throw new Error("NOUVA_CONTROL_PLANE_URL is required");
            }

            if (!secret) {
              throw new Error("NOUVA_AGENT_RELEASE_WEBHOOK_SECRET is required");
            }

            if (!digest) {
              throw new Error("DIGEST is required");
            }

            const payload = {
              version: process.env.VERSION,
              imageRef: `${imageName}@${digest}`,
              digest,
              gitSha: process.env.GIT_SHA,
              githubReleaseId: process.env.GITHUB_RELEASE_ID,
              githubReleaseUrl: process.env.GITHUB_RELEASE_URL,
              publishedAt: process.env.PUBLISHED_AT,
            };

            const body = JSON.stringify(payload);
            const signature = `sha256=${crypto.createHmac("sha256", secret).update(body).digest("hex")}`;
            const endpoint = `${baseUrl.replace(/\/$/, "")}/api/internal/agent-releases/published`;

            const response = await fetch(endpoint, {
              method: "POST",
              headers: {
                "content-type": "application/json",
                "x-nouva-signature-256": signature,
              },
              body,
            });

            if (!response.ok) {
              throw new Error(
                `Control plane release ingestion failed (${response.status}): ${await response.text()}`
              );
            }

            console.log(await response.text());
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Show image digest
        run: echo "Published ${IMAGE_NAME}@${{ steps.docker.outputs.digest }}"
